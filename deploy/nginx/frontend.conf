server {
    listen 80;
    server_name _;

    # Dist directory mounted inside the nginx container or host
    root /opt/project/scai/frontend/dist;
    client_max_body_size 100M;

    location / {
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|json)$ {
        try_files $uri =404;
        log_not_found off;
    }

    # Account Backend (5001)
    location /api/login {
        proxy_pass http://account-backend-svc:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/accountAdd {
        proxy_pass http://account-backend-svc:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve Backend (8401)
    location /api/settings/ {
        proxy_pass http://serve-backend-svc:8401/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Visual / Simulation service (8501)
    location ^~ /simulation/ {
        proxy_pass http://visual-backend-svc:8501/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Origin "";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Docsify manual (3000)
    location = /manual {
        return 301 /manual/;
    }

    location ^~ /manual/ {
        proxy_pass http://scai-docs-svc:3000/;
        proxy_set_header Host $host;
    }
}
